services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://lawyer_ai:lawyer_ai_local@postgres:5432/lawyer_ai
      LLM_PROVIDER: mock
      DEEPSEEK_API_KEY: ""
      DEEPSEEK_MODEL: deepseek-chat
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_TIMEOUT_SECONDS: "30"
      STORAGE_ROOT: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lawyer_ai
      POSTGRES_DB: lawyer_ai
      POSTGRES_PASSWORD: lawyer_ai_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro

volumes:
  postgres_data:
